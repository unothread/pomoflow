    - article [ref=e487]:
      - heading "Pomodoro Nedir?" [level=2] [ref=e488]
      - paragraph [ref=e489]:
        - strong [ref=e490]: Pomodoro Tekniği
        - text: ", 1980'lerin sonlarında Francesco Cirillo tarafından geliştirilen bir zaman yönetimi yöntemidir. Teknik, işi geleneksel olarak 25 dakika uzunluğunda, kısa molalarla ayrılmış aralıklara bölmek için bir zamanlayıcı kullanır. Bu aralıkların her birine, Cirillo'nun üniversite öğrencisiyken kullandığı domates şeklindeki mutfak zamanlayıcısının İtalyanca kelimesinden gelen bir"
        - emphasis [ref=e491]: pomodoro
        - text: denir.
      - paragraph [ref=e492]: Pomodoro sayacı kullanmanın temel amacı, odaklanmayı artırmak ve zihinsel yorgunluğu azaltmaktır. Sürekli uzun saatler çalışmak yerine, beyni düzenli aralıklarla dinlendirerek gün boyu yüksek verimlilik elde edebilirsiniz.
      - separator [ref=e493]
      - heading "Bu Sitede Neler Var? (Özellikler)" [level=2] [ref=e494]
      - generic [ref=e495]:
        - generic [ref=e496]:
          - heading "Zamanlayıcı (Timer)" [level=3] [ref=e497]:
            - img [ref=e498]
            - text: Zamanlayıcı (Timer)
          - paragraph [ref=e501]: Klasik 25 dakikalık odak, 5 dakikalık kısa mola ve 15 dakikalık uzun mola döngülerini kullanın. Ayarlar menüsünden tüm bu süreleri kendi çalışma alışkanlıklarınıza göre özelleştirebilirsiniz.
        - generic [ref=e502]:
          - heading "Yapılacaklar Listesi" [level=3] [ref=e503]:
            - img [ref=e504]
            - text: Yapılacaklar Listesi
          - paragraph [ref=e506]: Odaklanacağınız görevleri ekleyin ve tamamladıkça üzerini çizin. Basit ve dikkat dağıtmayan to-do listesi sayesinde sıradaki işinizi her zaman göz önünde bulundurun.
        - generic [ref=e507]:
          - heading "Lofi Radyo & Müzik" [level=3] [ref=e508]:
            - img [ref=e509]
            - text: Lofi Radyo & Müzik
          - paragraph [ref=e513]: Araştırmalar, sözsüz ve düşük tempolu (Lofi) müziklerin odaklanmayı artırdığını gösteriyor. Entegre radyomuzu kullanarak ekstra bir sekme açmadan Lofi Hip Hop dinleyebilirsiniz.
          - generic [ref=e514]:
            - strong [ref=e515]: Müzik Nasıl Değiştirilir?
            - text: Ayarlar (⚙️) menüsüne girin ve "Farklı yayın kullan" (Custom stream) alanına dilediğiniz YouTube canlı yayın veya video linkini yapıştırın. Sistem otomatik olarak o müziği çalmaya başlayacaktır.
      - separator [ref=e516]
      - heading "Pomodoro Manifestosu & Kapsamlı Rehber" [level=2] [ref=e517]
      - heading "Neden İşe Yarıyor?" [level=3] [ref=e518]
      - paragraph [ref=e519]:
        - text: "Modern çağda dikkat dağıtıcı unsurlar (bildirimler, e-postalar, sosyal medya) her yerde. Zihnimiz sürekli olarak \"context switching\" (bağlam değiştirme) yapıyor ve bu da bizi gün sonunda bitkin düşürüyor. Pomodoro tekniği, size basit bir sözleşme sunar:"
        - emphasis [ref=e520]: "\"Sadece 25 dakika boyunca tek bir şeye odaklanacağım.\""
        - text: Bu kısa süre, ertelemeyi (procrastination) yenmek için yeterince makul bir hedeftir.
      - heading "Nasıl Uygulanır?" [level=3] [ref=e521]
      - list [ref=e522]:
        - listitem [ref=e523]:
          - strong [ref=e524]: "Görevini Seç:"
          - text: Yapılacaklar listene odaklanacağın tek bir görevi yaz.
        - listitem [ref=e525]:
          - strong [ref=e526]: "Zamanlayıcıyı Başlat:"
          - text: 25 dakikalık "Odak" (Focus) sayacını çalıştır.
        - listitem [ref=e527]:
          - strong [ref=e528]: "Sadece Çalış:"
          - text: Süre bitene kadar telefonuna bakma, başka sekmeye geçme.
        - listitem [ref=e529]:
          - strong [ref=e530]: "Kısa Mola Ver:"
          - text: Alarm çaldığında 5 dakika dinlen. Ayağa kalk, su iç, gerin.
        - listitem [ref=e531]:
          - strong [ref=e532]: "Döngüyü Tekrarla:"
          - text: 4 Pomodoro döngüsünü tamamladıktan sonra (yaklaşık 2 saat), 15-30 dakikalık uzun bir mola (Long Break) ver.
      - heading "Kimler İçin Uygundur?" [level=3] [ref=e533]
      - paragraph [ref=e534]:
        - text: Sınavlara hazırlanan öğrenciler, yazılımcılar, tasarımcılar, yazarlar, home-office çalışanlar ve dikkatini toplamakta zorlanan herkes için idealdir. Bizim aracımız gibi sade bir
        - strong [ref=e535]: online pomodoro sayacı
        - text: kullanmak, ekstra bir uygulama indirme veya karmaşık ayarlarla uğraşma derdini ortadan kaldırır.
    - contentinfo [ref=e536]:
      - paragraph [ref=e537]: Pomodoro · yerel olarak çalışır, verilerin tarayıcında saklanır.
